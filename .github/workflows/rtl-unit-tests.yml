name: RTL unit tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify generated ML-KEM twiddles
        run: python3 software/reference/generate_twiddles_3329.py --check

      - name: Verify forward NTT schedule
        run: python3 software/reference/generate_forward_ntt_schedule.py --check

      - name: Run exhaustive Python arithmetic check
        run: python3 software/reference/check_barrett_3329.py

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run SystemVerilog unit tests
        run: bash scripts/sim/run_iverilog_unit_tests.sh
