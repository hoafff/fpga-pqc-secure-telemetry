name: RTL unit tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify generated ML-KEM twiddles
        run: python3 software/reference/generate_twiddles_3329.py --check

      - name: Verify forward NTT schedule
        run: python3 software/reference/generate_forward_ntt_schedule.py --check

      - name: Verify forward NTT integration models
        run: python3 software/reference/generate_forward_ntt_vectors.py --check

      - name: Run exhaustive Python arithmetic check
        run: python3 software/reference/check_barrett_3329.py

      - name: Install open-source HDL tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iverilog yosys

      - name: Run SystemVerilog unit and integration tests
        id: rtl_tests
        continue-on-error: true
        run: |
          mkdir -p build/sim
          bash scripts/sim/run_iverilog_unit_tests.sh \
            > build/sim/rtl-unit-tests.log 2>&1

      - name: Run generic Yosys synthesis check
        id: synth_check
        continue-on-error: true
        run: bash scripts/synth/check_forward_ntt_core_yosys.sh

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-logs
          path: |
            build/sim/rtl-unit-tests.log
            build/synth/yosys-forward-ntt-core.log
          if-no-files-found: warn

      - name: Report verification failure
        if: steps.rtl_tests.outcome == 'failure' || steps.synth_check.outcome == 'failure'
        run: |
          if [ -f build/sim/rtl-unit-tests.log ]; then
            cat build/sim/rtl-unit-tests.log
          fi
          if [ -f build/synth/yosys-forward-ntt-core.log ]; then
            cat build/synth/yosys-forward-ntt-core.log
          fi
          exit 1
